name: Formalization Docs

on:
  push:
    branches:
      - main
    paths:
      - "proofs/**"
      - "papers/**"
      - "docs/roadmaps/**"
      - "scripts/generate_bubeck_docs.py"
      - "mkdocs.yml"
      - "site_docs/**"
      - "tests/test_generate_bubeck_docs.py"
      - "requirements-docs.txt"
  pull_request:
    paths:
      - "proofs/**"
      - "papers/**"
      - "docs/roadmaps/**"
      - "scripts/generate_bubeck_docs.py"
      - "mkdocs.yml"
      - "site_docs/**"
      - "tests/test_generate_bubeck_docs.py"
      - "requirements-docs.txt"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: bubeck-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Run docs tests
        run: python -m pytest tests/test_generate_bubeck_docs.py

      - name: Generate docs content
        run: python3 scripts/generate_bubeck_docs.py --out site_docs/generated --repo-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

      - name: Build site
        run: mkdocs build

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
